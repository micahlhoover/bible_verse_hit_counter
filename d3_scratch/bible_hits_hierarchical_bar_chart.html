<!doctype html>
<meta charset="utf-8" />
<title>D3 Hierarchical Bar Chart - Bible Hits</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
  .hint { color: #555; margin-bottom: 12px; }
  svg { max-width: 100%; height: auto; }
</style>

<div class="hint">Click a blue bar to drill down (Book → Chapter). Click the background to go back up.</div>
<div id="chart"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ---- Your data converted to d3.hierarchy({name, children}) format ----
const data = {"name": "Bible", "children": [{"name": "Mark", "children": [{"name": "Chapter 1", "size": 18400000}, {"name": "Chapter 2", "size": 20900000}, {"name": "Chapter 3", "size": 39300000}, {"name": "Chapter 4", "size": 7750000}, {"name": "Chapter 5", "size": 6190000}, {"name": "Chapter 6", "size": 5600000}, {"name": "Chapter 7", "size": 6100000}, {"name": "Chapter 8", "size": 6630000}, {"name": "Chapter 9", "size": 14100000}, {"name": "Chapter 10", "size": 9320000}, {"name": "Chapter 11", "size": 10700000}, {"name": "Chapter 12", "size": 8970000}, {"name": "Chapter 13", "size": 8140000}, {"name": "Chapter 14", "size": 286000}, {"name": "Chapter 15", "size": 4900000}, {"name": "Chapter 16", "size": 24200000}], "book_verse_hit_total": 30835005000}, {"name": "Matthew", "children": [{"name": "Chapter 1", "size": 13100000}, {"name": "Chapter 2", "size": 7310000}, {"name": "Chapter 3", "size": 17800000}, {"name": "Chapter 4", "size": 6140000}, {"name": "Chapter 5", "size": 6880000}, {"name": "Chapter 6", "size": 7130000}, {"name": "Chapter 7", "size": 5370000}, {"name": "Chapter 8", "size": 2470000}, {"name": "Chapter 9", "size": 1110000}, {"name": "Chapter 10", "size": 2230000}, {"name": "Chapter 11", "size": 13100000}, {"name": "Chapter 12", "size": 3580000}, {"name": "Chapter 13", "size": 374000}, {"name": "Chapter 14", "size": 792000}, {"name": "Chapter 15", "size": 664000}, {"name": "Chapter 16", "size": 4530000}, {"name": "Chapter 17", "size": 1420000}, {"name": "Chapter 18", "size": 1230000}, {"name": "Chapter 19", "size": 4780000}, {"name": "Chapter 20", "size": 742000}, {"name": "Chapter 21", "size": 353000}, {"name": "Chapter 22", "size": 389000}, {"name": "Chapter 23", "size": 687000}, {"name": "Chapter 24", "size": 327000}, {"name": "Chapter 25", "size": 833000}, {"name": "Chapter 26", "size": 120000}, {"name": "Chapter 27", "size": 176000}, {"name": "Chapter 28", "size": 6720000}], "book_verse_hit_total": 10919104100}, {"name": "Proverbs", "children": [{"name": "Chapter 1", "size": 839000}, {"name": "Chapter 2", "size": 908000}, {"name": "Chapter 3", "size": 338000}, {"name": "Chapter 4", "size": 376000}, {"name": "Chapter 5", "size": 1260000}, {"name": "Chapter 6", "size": 374000}, {"name": "Chapter 7", "size": 311000}, {"name": "Chapter 8", "size": 702000}, {"name": "Chapter 9", "size": 456000}, {"name": "Chapter 10", "size": 383000}, {"name": "Chapter 11", "size": 351000}, {"name": "Chapter 12", "size": 963000}, {"name": "Chapter 13", "size": 376000}, {"name": "Chapter 14", "size": 108000}, {"name": "Chapter 15", "size": 462000}, {"name": "Chapter 16", "size": 1050000}, {"name": "Chapter 17", "size": 592000}, {"name": "Chapter 18", "size": 2210000}, {"name": "Chapter 19", "size": 269000}, {"name": "Chapter 20", "size": 762000}, {"name": "Chapter 21", "size": 441000}, {"name": "Chapter 22", "size": 1340000}, {"name": "Chapter 23", "size": 179000}, {"name": "Chapter 24", "size": 189000}, {"name": "Chapter 25", "size": 1090000}, {"name": "Chapter 26", "size": 1220000}, {"name": "Chapter 27", "size": 258000}, {"name": "Chapter 28", "size": 298000}, {"name": "Chapter 29", "size": 86700}, {"name": "Chapter 30", "size": 336000}, {"name": "Chapter 31", "size": 466000}], "book_verse_hit_total": 1181446700}]};

const width = 950;
const marginTop = 30;
const marginLeft = 180;
const barStep = 28;
const duration = 750;

const root = d3.hierarchy(data)
  .sum(d => d.size || 0)
  //.sort((a, b) => b.value - a.value);

const x = d3.scaleLinear().range([marginLeft, width - 20]);

const svg = d3.create("svg");
svg.append("rect")
  .attr("class", "background")
  .attr("fill", "none")
  .attr("pointer-events", "all")
  .on("click", () => current.parent && render(current.parent));

svg.append("g").attr("class", "bars");

document.getElementById("chart").appendChild(svg.node());

let current = root;
render(root);

function render(node) {
  current = node;
  const bars = node.children || [];
  const height = barStep * bars.length + marginTop;

  svg.attr("width", width).attr("height", height);
  svg.select(".background").attr("width", width).attr("height", height);

  x.domain([0, d3.max(bars, d => d.value) || 0]);

  const g = svg.select(".bars").attr("transform", `translate(0,${marginTop})`);

  const row = g.selectAll("g.row")
    .data(bars, d => d.data.name);

  const rowEnter = row.enter().append("g")
    .attr("class", "row")
    .attr("transform", (d, i) => `translate(0,${i * barStep})`)
    .style("cursor", d => d.children ? "pointer" : "default")
    .on("click", (e, d) => { e.stopPropagation(); if (d.children) render(d); });

  rowEnter.append("text")
    .attr("x", marginLeft - 6)
    .attr("y", barStep / 2)
    .attr("dy", ".35em")
    .attr("text-anchor", "end")
    .text(d => d.data.name);

  rowEnter.append("rect")
    .attr("x", x(0))
    .attr("height", barStep - 4)
    .attr("fill", "steelblue")
    .attr("y", 2);

  rowEnter.append("title");

  row.merge(rowEnter)
    .transition().duration(duration)
    .attr("transform", (d, i) => `translate(0,${i * barStep})`);

  row.merge(rowEnter).select("rect")
    .transition().duration(duration)
    .attr("width", d => x(d.value) - x(0));

  row.merge(rowEnter).select("title")
    .text(d => `${d.data.name}
Hits: ${d3.format(",d")(d.value)}`);

  row.exit().remove();
}
</script>
