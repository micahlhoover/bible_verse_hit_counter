<!doctype html>
<meta charset="utf-8" />
<title>D3 Hierarchical Bar Chart (Standalone)</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
  .hint { color: #555; margin-bottom: 12px; }
  svg { max-width: 100%; height: auto; }
</style>

<div class="hint">Click a blue bar to drill down. Click the background to go back up.</div>
<div id="chart"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// --- Hierarchical data WITH depth for drill-down ---
const data = {
  name: "flare",
  children: [
    {
      name: "analytics",
      children: [
        { name: "cluster", children: [
          { name: "AgglomerativeCluster", size: 3938 },
          { name: "CommunityStructure", size: 3812 }
        ] },
        { name: "graph", children: [
          { name: "ShortestPaths", size: 5914 },
          { name: "SpanningTree", size: 3416 }
        ] }
      ]
    },
    {
      name: "data",
      children: [
        { name: "converters", children: [
          { name: "JSONConverter", size: 2220 },
          { name: "DelimitedTextConverter", size: 4294 }
        ] }
      ]
    }
  ]
};

const width = 900;
const marginTop = 30;
const marginLeft = 150;
const barStep = 28;
const duration = 750;

const root = d3.hierarchy(data)
  .sum(d => d.size || 0)
  .sort((a, b) => b.value - a.value);

const x = d3.scaleLinear().range([marginLeft, width - 20]);

const svg = d3.create("svg");
svg.append("rect")
  .attr("class", "background")
  .attr("fill", "none")
  .attr("pointer-events", "all")
  .on("click", () => current.parent && render(current.parent));

svg.append("g").attr("class", "bars");

const chartDiv = document.getElementById("chart");
chartDiv.appendChild(svg.node());

let current = root;
render(root);

function render(node) {
  current = node;
  const bars = node.children || [];
  const height = barStep * bars.length + marginTop;

  svg.attr("width", width).attr("height", height);
  svg.select(".background").attr("width", width).attr("height", height);

  x.domain([0, d3.max(bars, d => d.value)]);

  const g = svg.select(".bars").attr("transform", `translate(0,${marginTop})`);

  const row = g.selectAll("g.row")
    .data(bars, d => d.data.name);

  const rowEnter = row.enter().append("g")
    .attr("class", "row")
    .attr("transform", (d, i) => `translate(0,${i * barStep})`)
    .style("cursor", d => d.children ? "pointer" : "default")
    .on("click", (e, d) => d.children && render(d));

  rowEnter.append("text")
    .attr("x", marginLeft - 6)
    .attr("y", barStep / 2)
    .attr("dy", ".35em")
    .attr("text-anchor", "end")
    .text(d => d.data.name);

  rowEnter.append("rect")
    .attr("x", x(0))
    .attr("height", barStep - 4)
    .attr("fill", "steelblue")
    .attr("y", 2);

  row.merge(rowEnter)
    .transition().duration(duration)
    .attr("transform", (d, i) => `translate(0,${i * barStep})`)
    .select("rect")
    .attr("width", d => x(d.value) - x(0));

  row.exit().remove();
}
</script>
